name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: registry.digitalocean.com/xchains-registry
  IMAGE_NAME: <PROJECT_NAME>
  STAGING_NAMESPACE: <PROJECT_NAME>-staging
  PROD_NAMESPACE: <PROJECT_NAME>

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_API_TOKEN }}

      - name: Login to DO Container Registry
        run: doctl registry login

      - name: Build Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Push Docker image
        run: docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save doks-nyc3-main

      - name: Update staging image tag
        run: |
          kubectl set image deployment/${{ env.IMAGE_NAME }} \
            ${{ env.IMAGE_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ env.STAGING_NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ env.IMAGE_NAME }} -n ${{ env.STAGING_NAMESPACE }} --timeout=300s

  smoke-test:
    name: Staging Smoke Test
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://<SUBDOMAIN>-staging.xchains.dev/healthz || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Readiness check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://<SUBDOMAIN>-staging.xchains.dev/ready)
          if [ "$STATUS" != "200" ]; then
            echo "Readiness check failed: $STATUS"
            exit 1
          fi
          echo "Readiness check passed"

  deploy-prod:
    name: Deploy to Production
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_API_TOKEN }}

      - name: Configure kubectl
        run: doctl kubernetes cluster kubeconfig save doks-nyc3-main

      - name: Update production image tag
        run: |
          kubectl set image deployment/${{ env.IMAGE_NAME }} \
            ${{ env.IMAGE_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n ${{ env.PROD_NAMESPACE }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/${{ env.IMAGE_NAME }} -n ${{ env.PROD_NAMESPACE }} --timeout=300s

  verify:
    name: Post-Deploy Verification
    needs: deploy-prod
    runs-on: ubuntu-latest
    steps:
      - name: Health check (production)
        run: |
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://<SUBDOMAIN>.xchains.dev/healthz || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
            else
              echo "Health check FAILED at attempt $i: $STATUS"
              exit 1
            fi
            sleep 5
          done
          echo "Production stable for 60 seconds"
