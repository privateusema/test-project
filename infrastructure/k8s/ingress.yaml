apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-project
  namespace: test-project
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  tls:
    - hosts:
        - test.xchains.dev
      secretName: xchains-origin-tls
  rules:
    - host: test.xchains.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: test-project
                port:
                  number: 80
