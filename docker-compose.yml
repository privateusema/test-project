services:

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src          # Hot reload: mount source so changes reflect without rebuild
    env_file:
      - .env
    depends_on:
      - valkey

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

volumes:
  valkey_data:

# ── Notes ─────────────────────────────────────────────────────────────────────
# Supabase local dev is NOT managed here — use the Supabase CLI instead:
#   npx supabase start        ← starts local Postgres + Auth + Studio + Edge Functions
#   npx supabase stop         ← stops all local Supabase services
#   npx supabase status       ← shows local URLs and keys
#
# Once started, add the local Supabase URL and keys to your .env:
#   SUPABASE_URL=http://127.0.0.1:54321
#   SUPABASE_ANON_KEY=<from supabase status output>
#   SUPABASE_SERVICE_ROLE_KEY=<from supabase status output>
